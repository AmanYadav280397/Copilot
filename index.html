<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outbound Campaign View · Copilot Concept</title>
<style>
  :root{
    --bg:#f4f5f7; --white:#fff; --ink:#262d38; --ink2:#161c25;
    --muted:#6a7480; --faint:#98a1ad; --line:#e8eaee; --line2:#f0f1f4;
    --blue:#1250de; --bluebg:#e8f0ff; --purple:#a337f6; --purplebg:#f6f0ff; --purpleln:#d7b3fb;
    --cyan:#00bae9; --cyandk:#108acc; --cyanbg:#e6f7fd;
    --green:#1ba672; --amber:#f59e0b; --amberbg:#fef3e2; --red:#ee5a47; --sel:#f4f4f6;
    --orange:#faa21b; --bgreen:#70bf54; --grad:linear-gradient(135deg,#faa21b,#70bf54,#00bae9,#108acc);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:var(--white);color:var(--ink);font-family:-apple-system,"Inter","Segoe UI",Helvetica,Arial,sans-serif;font-size:13px;overflow:hidden;}
  svg{display:block;width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
  input{font-family:inherit;}

  /* ===== top bar ===== */
  .top{height:46px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:4px;padding:0 8px;position:relative;z-index:30;}
  .logo{width:24px;height:24px;color:#16a085;flex:0 0 auto;margin:0 4px;}
  .logo svg{width:22px;height:22px;stroke-width:1.4;}
  .ws{display:flex;align-items:center;gap:5px;font-weight:700;font-size:13px;color:var(--ink2);padding:5px 7px;border-radius:7px;white-space:nowrap;flex:0 0 auto;}
  .ws svg{width:13px;height:13px;color:var(--faint);}
  .tabs{display:flex;align-items:center;gap:1px;overflow:hidden;flex:1 1 auto;min-width:0;}
  .tab{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:7px;color:var(--muted);font-size:12.5px;font-weight:600;white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis;cursor:default;flex:0 0 auto;}
  .tab svg{width:13px;height:13px;flex:0 0 auto;opacity:.65;}
  .tab span{overflow:hidden;text-overflow:ellipsis;}
  .tab.active{color:var(--purple);border:1px solid var(--purpleln);background:var(--purplebg);}
  .ib{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:default;flex:0 0 auto;position:relative;}
  .ib:hover{background:#f3f5f8;}
  .ib .dot{position:absolute;top:4px;right:5px;width:13px;height:13px;background:var(--red);color:#fff;border-radius:50%;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;}
  .ib .day{position:absolute;font-size:7px;font-weight:800;color:var(--muted);top:11px;}
  .rgroup{display:flex;align-items:center;gap:2px;flex:0 0 auto;}
  .sess{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--ink);background:#f3f5f8;border-radius:7px;padding:5px 9px;white-space:nowrap;margin:0 2px;}
  .sess .t{color:var(--muted);font-weight:600;} .sess .voip{color:var(--green);}
  .sess svg{width:13px;height:13px;color:var(--green);}
  .copbtn{display:flex;align-items:center;gap:6px;background:var(--grad);color:#fff;border:none;border-radius:8px;padding:7px 11px;font-weight:800;font-size:12.5px;cursor:pointer;font-family:inherit;margin-left:4px;}
  .copbtn svg{width:14px;height:14px;stroke:#fff;}
  .copbtn.pulse{animation:pulse 1.9s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,186,233,.45);}70%{box-shadow:0 0 0 9px rgba(0,186,233,0);}100%{box-shadow:0 0 0 0 rgba(0,186,233,0);}}
  .concept{border:1px solid var(--cyan);color:var(--cyandk);background:var(--cyanbg);font-size:9px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;padding:4px 7px;border-radius:999px;white-space:nowrap;margin:0 4px;}
  .ava{width:28px;height:28px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex:0 0 auto;}

  /* ===== layout ===== */
  .wrap{display:flex;height:calc(100vh - 46px);}
  .rail{width:50px;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding-top:9px;gap:3px;flex:0 0 auto;}
  .rail .r{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#9aa6b2;cursor:default;}
  .rail .r svg{width:19px;height:19px;}
  .rail .r.active{background:#e8f0fb;color:var(--blue);}
  .rail .r:hover{background:#f3f5f8;}

  .panels{flex:1 1 auto;display:flex;min-width:0;padding:0;background:#fff;}
  .panel{background:#fff;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
  .panel.left{flex:0 0 40%;}
  .panel.right{flex:1 1 auto;}
  .splitter{flex:0 0 7px;cursor:col-resize;display:flex;align-items:stretch;justify-content:center;}
  .splitter::after{content:"";width:1px;background:var(--line);transition:.15s;}
  .splitter:hover::after{background:var(--blue);width:2px;}

  .phead{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);flex:0 0 auto;}
  .phead .ttl{font-weight:800;font-size:14px;display:flex;align-items:center;gap:5px;white-space:nowrap;color:var(--ink2);}
  .phead .ttl svg{width:13px;height:13px;color:var(--faint);}
  .srch{flex:1 1 auto;display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:8px;padding:0 9px;min-width:50px;height:32px;}
  .srch svg{width:14px;height:14px;color:var(--faint);flex:0 0 auto;}
  .srch input{border:none;outline:none;flex:1;font-size:12.5px;color:var(--ink);background:transparent;min-width:0;}
  .srch .slash{border:1px solid var(--line);border-radius:5px;padding:0 6px;font-size:11px;color:var(--faint);flex:0 0 auto;}
  .htools{display:flex;align-items:center;gap:2px;flex:0 0 auto;}
  .htog{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--faint);cursor:pointer;}
  .htog svg{width:16px;height:16px;}
  .htog:hover{background:#f3f5f8;}
  .htog.on{background:var(--bluebg);color:var(--blue);}

  .subbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f8f8fa;border-bottom:1px solid #e6e6e9;flex:0 0 auto;}
  .filt{display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:7px;padding:5px 9px;font-size:12px;font-weight:600;color:var(--ink);cursor:default;}
  .filt svg{width:11px;height:11px;color:var(--faint);}
  .filt .n{background:var(--bluebg);color:var(--blue);border-radius:5px;padding:0 5px;font-size:11px;font-weight:800;}
  .addb{width:28px;height:28px;border:1px solid var(--line);border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:default;}
  .addb svg{width:14px;height:14px;}
  .clear{margin-left:auto;color:var(--blue);font-weight:700;font-size:12.5px;cursor:pointer;}

  .tbl{flex:1 1 auto;overflow:auto;}
  table{width:100%;border-collapse:collapse;}
  thead th{position:sticky;top:0;background:#f8f8fa;text-align:left;font-size:13px;color:var(--ink2);font-weight:600;padding:9px 12px;border-bottom:1px solid #e6e6e9;border-right:1px solid #ededf0;white-space:nowrap;z-index:1;}
  thead th:last-child,thead th.plain{border-right:none;}
  .hd{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .hd .hc{color:#b4bcc6;display:inline-flex;align-items:center;}
  .hd .hc svg{width:11px;height:11px;}
  tbody td{padding:6px 12px;border-bottom:1px solid #ededf0;border-right:1px solid #ededf0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink);}
  tbody tr{cursor:default;}
  tbody tr:hover{background:#fafbfd;}
  tbody tr.sel{background:var(--sel);}
  tbody tr.sel td:first-child{box-shadow:inset 3px 0 0 var(--blue);}
  .idx{color:var(--faint);width:34px;}
  .kebab{width:16px;color:#c2ccd6;}.kebab svg{width:15px;height:15px;}
  .nm{font-weight:400;color:var(--ink2);}
  .exp{background:var(--red);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;margin-left:8px;vertical-align:middle;}
  .cbx{width:15px;height:15px;border:1.5px solid #c5ced8;border-radius:4px;display:inline-block;vertical-align:middle;}
  .stat{display:inline-flex;align-items:center;gap:7px;color:var(--ink);font-weight:600;}
  .stat .d{width:7px;height:7px;border-radius:50%;background:var(--green);}
  .stat .sq{width:14px;height:14px;border-radius:4px;background:#e0ebff;position:relative;flex:0 0 auto;}
  .stat .sq::after{content:"";position:absolute;width:5px;height:5px;border-radius:50%;background:#1250de;left:50%;top:50%;transform:translate(-50%,-50%);}
  .num{font-variant-numeric:tabular-nums;}
  .empty{padding:26px 12px;color:var(--faint);font-style:italic;text-align:center;}
  tbody tr.fresh{animation:fresh 1.3s ease;}
  @keyframes fresh{0%{background:var(--cyanbg);}100%{background:#fff;}}
  .rpill{display:inline-block;margin-left:8px;background:#fff3df;color:#b9760a;font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;vertical-align:middle;}

  /* ===== call widget ===== */
  .callw{display:none;position:fixed;left:11px;bottom:11px;width:258px;background:#1c2330;color:#e7edf3;border-radius:12px;padding:9px;font-size:12px;z-index:25;box-shadow:0 12px 32px rgba(0,0,0,.28);}
  .callw .row{display:flex;align-items:center;gap:8px;padding:5px 4px;}
  .callw svg{width:14px;height:14px;}
  .callw .grip{color:#586577;}.callw .grip svg{width:11px;height:16px;}
  .callw .ses{background:#2b3442;border-radius:7px;padding:6px 9px;font-weight:700;display:flex;align-items:center;gap:6px;flex:1;}
  .callw .ses svg{width:11px;height:11px;color:#9fb0c0;}
  .callw .tm{background:#2b3442;border-radius:7px;padding:6px 9px;font-weight:700;font-variant-numeric:tabular-nums;}
  .callw .mic{color:#4ade80;} .callw .gear{margin-left:auto;color:#9fb0c0;}
  .callw .lbl{color:#aebccb;font-size:11.5px;}
  .callw .wrtc{color:#ff8a8a;font-weight:700;display:flex;align-items:center;gap:5px;}
  .callw .badge{background:var(--red);color:#fff;border-radius:999px;padding:0 6px;font-size:10px;font-weight:800;}
  .spin{width:11px;height:11px;border:2px solid #46526380;border-top-color:#9fb0c0;border-radius:50%;animation:spin 1s linear infinite;}

  /* ===== copilot drawer ===== */
  .scrim{position:fixed;inset:46px 0 0 0;background:rgba(15,23,34,.10);opacity:0;pointer-events:none;transition:.25s;z-index:35;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:46px;right:0;bottom:0;width:480px;background:radial-gradient(60% 55% at 14% 26%,rgba(252,183,42,.26) 0%,rgba(252,183,42,0) 62%),radial-gradient(58% 52% at 50% 88%,rgba(108,239,90,.26) 0%,rgba(108,239,90,0) 62%),radial-gradient(62% 58% at 90% 74%,rgba(59,229,255,.30) 0%,rgba(59,229,255,0) 62%),#fff;border-left:1px solid var(--line);box-shadow:-12px 0 40px rgba(15,23,34,.12);transform:translateX(110%);transition:transform .3s cubic-bezier(.3,.8,.3,1),width .3s cubic-bezier(.3,.8,.3,1);z-index:40;display:flex;flex-direction:column;}
  .drawer.open{transform:none;}
  .drawer.max{width:100%;}
  .drawer.max .cp-body,.drawer.max .cp-foot{padding-left:max(14px,calc((100% - 760px)/2));padding-right:max(14px,calc((100% - 760px)/2));}
  .cp-head{display:flex;align-items:center;gap:10px;padding:12px 14px;flex:0 0 auto;background:transparent;}
  .cp-mark{width:28px;height:28px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
  .cp-mark svg{width:100%;height:100%;stroke:none;}
  .cp-mark svg path{stroke:none;}
  .cp-head .t{font-weight:800;font-size:14px;}
  .cp-head .ctx{font-size:10.5px;color:var(--cyandk);font-weight:700;background:var(--cyanbg);padding:3px 8px;border-radius:999px;margin-top:3px;display:inline-block;}
  .cp-head .cphome{width:30px;height:30px;border-radius:8px;border:none;background:var(--grad);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;margin-right:2px;box-shadow:0 2px 8px rgba(0,186,233,.28);}
  .cp-head .cphome svg{width:16px;height:16px;stroke:#fff;}
  .cp-head .cphome:hover{filter:brightness(.96);}
  .cp-head .cpmax{margin-left:auto;width:28px;height:28px;border-radius:7px;border:none;background:#f3f5f8;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .cp-head .cpmax svg{width:15px;height:15px;}
  .cp-head .cpmax:hover{background:#e9edf2;color:var(--ink);}
  .cp-head .cls{margin-left:6px;width:28px;height:28px;border-radius:7px;border:none;background:#f3f5f8;color:var(--muted);cursor:pointer;font-size:17px;line-height:1;}
  .cp-head .cls:hover{background:#e9edf2;color:var(--ink);}
  .cp-body{flex:1 1 auto;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px;}
  .cp-foot{padding:11px 12px 14px;background:transparent;flex:0 0 auto;}
  .cpinbar{display:flex;align-items:center;gap:8px;min-height:62px;background:#fff;border:1px solid var(--line);border-radius:34px;padding:0 12px;box-shadow:0 2px 16px rgba(15,23,34,.08);}
  .cpinbar:focus-within{border-color:#d4d9e0;box-shadow:0 4px 20px rgba(15,23,34,.11);}
  .cpinbar .plus{flex:0 0 auto;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:22px;font-weight:400;line-height:1;}
  .cpinbar input{flex:1;border:none;background:transparent;padding:10px 6px;font-family:inherit;font-size:15px;outline:none;color:var(--ink);min-width:0;}
  .cpinbar input:disabled{opacity:.6;}
  .cpinbar button{flex:0 0 auto;width:36px;height:36px;border:none;border-radius:50%;background:#262d38;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .cpinbar button:disabled{background:#e6e9ee;color:#aeb6c0;cursor:default;}

  /* ===== Sprinklr Copilot landing ===== */
  .cp-landing{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;padding:18px;background:transparent;}
  .cp-greet{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .cp-greet .cp-mark{width:38px;height:38px;}
  .cp-greet .gt{text-align:center;}
  .cp-greet .hi{font-size:18px;color:var(--ink);font-weight:400;line-height:1.35;}
  .cp-greet .q{font-size:18px;color:var(--ink2);font-weight:700;line-height:1.3;}
  .cp-sugs{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;max-width:360px;}
  .cp-sugs-inline{justify-content:flex-start;max-width:520px;margin:2px 0 4px 42px;}
  .sug{background:#fff;border:1px solid var(--line);border-radius:32px;padding:8px 18px;font-size:13px;font-weight:500;color:var(--ink2);cursor:pointer;font-family:inherit;box-shadow:0 1px 2px rgba(15,23,34,.04);}
  .sug:hover{border-color:#d4d9e0;background:#fcfdfe;}
  .sug.more{color:var(--muted);display:inline-flex;align-items:center;gap:5px;}
  .cp-greet .hi{font-size:30px;font-weight:500;color:var(--ink);line-height:1.2;}
  .cp-greet .hi b{font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
  .cp-greet .q{font-size:18px;font-weight:700;color:var(--ink2);line-height:1.3;margin-top:3px;}
  .cp-cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:540px;}
  .cpcard{text-align:left;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 11px;cursor:pointer;font-family:inherit;box-shadow:0 1px 2px rgba(15,23,34,.04);display:flex;flex-direction:column;gap:5px;transition:transform .12s,box-shadow .12s,border-color .12s;}
  .cpcard:hover{border-color:#d4d9e0;box-shadow:0 6px 18px rgba(15,23,34,.09);transform:translateY(-1px);}
  .cphead{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .cpcard .ci{width:25px;height:25px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--grad);color:#fff;flex:0 0 auto;}
  .cpcard .ci svg{width:14px;height:14px;}
  .cpcard .ctag{font-size:8px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--faint);}
  .cpcard.c2 .ci{background:var(--amberbg);color:#b9760a;} .cpcard.c3 .ci{background:#fdebe8;color:#d2402c;} .cpcard.c4 .ci{background:#e6f6ef;color:#1ba672;} .cpcard.c5 .ci{background:var(--bluebg);color:var(--blue);} .cpcard.c6 .ci{background:var(--purplebg);color:var(--purple);}
  .cpcard.c2 .ctag{color:#b9760a;} .cpcard.c3 .ctag{color:#d2402c;} .cpcard.c4 .ctag{color:#1ba672;} .cpcard.c5 .ctag{color:var(--blue);} .cpcard.c6 .ctag{color:var(--purple);}
  .cpcard .ct{font-weight:800;font-size:13px;color:var(--ink2);}
  .cpcard .cd{font-size:11px;line-height:1.4;color:var(--muted);font-weight:500;}
  .cp-legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:560px;margin-top:4px;}
  .leg{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--muted);}
  .leg i{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .backlink{background:none;border:none;color:var(--muted);font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;padding:2px 0;align-self:flex-start;}
  .backlink:hover{color:var(--ink2);}
  .msg{max-width:90%;font-size:15px;}
  .msg.user{align-self:flex-end;}
  .msg.user .b{background:#f8f8fa;color:var(--ink2);border:1px solid var(--line);border-radius:18px 18px 4px 18px;padding:11px 15px;line-height:1.45;}
  .msg.bot{align-self:flex-start;max-width:94%;display:flex;gap:9px;align-items:flex-start;}
  .msg.bot.wide{max-width:100%;align-self:stretch;}
  .msg.bot .mk{flex:0 0 auto;width:22px;height:22px;margin-top:2px;}
  .msg.bot .mk svg{width:100%;height:100%;stroke:none;}
  .msg.bot .bc{flex:1 1 auto;min-width:0;}
  .msg.bot .b{background:transparent;color:var(--ink2);padding:2px 0;line-height:1.5;}
  .tool{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 11px;font-size:12px;align-self:flex-start;max-width:94%;}
  .tool .sp{width:14px;height:14px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--cyan);animation:spin .7s linear infinite;flex:0 0 auto;}
  .tool.done .sp{border:none;animation:none;background:var(--green);position:relative;}
  .tool.done .sp::after{content:"✓";color:#fff;font-size:9px;font-weight:900;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  .tool .nm{font-weight:700;}.tool .ds{color:var(--faint);font-size:11px;}
  .tool .vtag{margin-left:auto;font-size:8.5px;font-weight:800;letter-spacing:.5px;color:var(--cyandk);background:var(--cyanbg);padding:2px 6px;border-radius:5px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .typing{display:flex;gap:4px;padding:11px 12px;background:#f3f6f9;border-radius:13px;width:fit-content;}
  .typing span{width:7px;height:7px;border-radius:50%;background:#b8c4d0;animation:bounce 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.15s;}.typing span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-5px);opacity:1;}}
  .guard{font-size:11.5px;color:#b9760a;background:var(--amberbg);border-radius:9px;padding:7px 10px;align-self:flex-start;max-width:94%;}
  .guard b{color:#9c6207;}
  .wdg{background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 10px;}
  .wdg .wt{font-size:10.5px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px;}
  .brow{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:11.5px;}
  .brow .bl{width:130px;color:var(--ink);}
  .brow .bbar{flex:1;height:7px;background:#eef1f4;border-radius:4px;overflow:hidden;}
  .brow .bbar i{display:block;height:100%;border-radius:4px;}

// metric-based criteria, set independently per view
const METRICS=['Connect %','RPC %','Attempt %','Conversion %','Revenue (₹)'];
let critUnder={metric:'Connect %',value:64};
let critAttn={metric:'Connect %',value:60};
function rateOf(c){return c.dialled?c.connected/c.dialled*100:0;}
function metricVal(c,metric){const dl=c.dialled||0,cn=c.connected||0,tot=c.total||1;
 if(metric==='Connect %')return dl?cn/dl*100:0;
 if(metric==='RPC %')return dl?cn*0.72/dl*100:0;
 if(metric==='Attempt %')return tot?dl/tot*100:0;
 if(metric==='Conversion %')return dl?cn*0.16/dl*100:0;
 if(metric.indexOf('Revenue')===0)return cn*1200;
 return 0;}
function critFmt(cr){return cr.metric.indexOf('Revenue')===0?'₹'+cr.value.toLocaleString():cr.value+'%';}
function fmtMetric(c,metric){const v=metricVal(c,metric);return metric.indexOf('Revenue')===0?'₹'+Math.round(v).toLocaleString():v.toFixed(1)+'%';}
function criteriaLink(view){const cl=document.createElement('button');cl.className='backlink';cl.textContent='⚙ Set criteria';cl.onclick=()=>{if(!cpBusy)setCriteria(view);};body.appendChild(cl);scroll();}

const LFILES=['Apr_Batch_01.csv','Apr_Batch_02.csv','Web_Leads_Mar.csv','CRM_Sync_Apr.csv'];
// reconciled lead model: total = fresh + dialled; dialled = connected + not-connected; retried & retried-scheduled are subsets
const TFRAMES={'Today':1,'Tomorrow':0.45,'This week':5.4,'Last week':6.1};
let leadTF='Today';
function leadAgg(tf){
 const f=TFRAMES[tf]||1, R=n=>Math.round(n*f);
 const total=R(4200), fresh=R(1600), dialled=total-fresh, connected=R(1100), notConnected=dialled-connected;
 return {total,fresh,dialled,connected,notConnected,retried:R(900),retriedSched:R(600)};
}
// lead-level records with full call detail, tagged by campaign / segment / file
const TELS2=['Voicemail','Busy','No answer','Call Drop','Connected'];
const BIZO=['Interested','Callback','Pricing objection','Converted','Not interested'];

 ACTIVE.forEach((c,ci)=>{ campSegments(c).slice(0,2).forEach((s,si)=>{ for(let k=0;k<2;k++){
   const h=ci*5+si*3+k*2, status=['fresh','attempted','connected','retry'][h%4], dialled=status!=='fresh', isConn=status==='connected';
   recs.push({id:'L'+(id++),campaign:c.name,segment:s.name,file:LFILES[(ci+si+k)%LFILES.length],
     ing:TIMES[h%TIMES.length],status,
     att:dialled?TIMES[(h+2)%TIMES.length]:'—', conn:isConn?TIMES[(h+3)%TIMES.length]:'—',
     sched:(status==='attempted'||status==='retry')?TIMES[(h+5)%TIMES.length]:'—',
     campCount:dialled?1+(h%3):0, globalCount:1+(h%5), lastTel:dialled?TELS2[h%5]:'—', biz:isConn?BIZO[h%BIZO.length]:'—'});
 }});});
 return recs;
}

// derive segment-wise breakdown for a campaign: splits the totals and adds operational detail
function campSegments(c){
 const d=campDetail(c);
 const n=3+(abbr(c.name).length%2); // 3 or 4 segments
 const slotLbls=["Weekday 9AM-12PM","Weekday 12PM-3PM","Weekday 3PM-6PM","Saturday 9AM-3PM"];
 const bizHours=["9 AM - 6 PM","10 AM - 7 PM","9 AM - 1 PM","8 AM - 8 PM"];
 const dialPlans=["Default","TRAI-1600 safe","DND-filtered","After-hours"];
 const skills=["Retention","Collections","Sales","Support"];
 const segs=[]; let rt=c.total, rd=c.dialled||0, rc=c.connected||0;
 for(let i=0;i<n;i++){
   const last=i===n-1;
   const t=last?rt:Math.round(c.total/n);
   const di=last?rd:Math.round((c.dialled||0)/n);
   const co=last?rc:Math.round((c.connected||0)/n);
   rt-=t; rd-=di; rc-=co;
   const noConn=Math.max(0,di-co), hsh=abbr(c.name).charCodeAt(0)+i*7;
   segs.push({
     name:"ACME_"+abbr(c.name)+"_"+abbr(slotLbls[i%slotLbls.length]),
     status:['Active','Paused','Processed','Stopped'][i%4], reach:t?Math.round(di/t*100):0,
     total:t,dialled:di,connected:co, fresh:Math.max(0,t-di), retried:Math.round(noConn*0.31),
     avail:1+(hsh%4), online:agents.length, prof:d.prof,
     biz:bizHours[i%bizHours.length], inflight:di?(2+(hsh%9)):0,
     plan:dialPlans[i%dialPlans.length], supp:300+((hsh*137)%1700), skill:skills[i%skills.length]
   });
 }
 return segs;
}

function telephony(m){

  {key:'busy',label:'Busy',count:busy,retryHrs:0.5},
  {key:'drop',label:'Call Drop',count:drop,retryHrs:2},
  {key:'invalid',label:'Invalid number',count:inv,retryHrs:null},
  {key:'noans',label:'No answer',count:noans,retryHrs:2}
 ]};
}

 botBlock(`<div class="wdg"><div class="wt">Calls by telephony outcome · ${m.kind}: ${m.name}</div>
  <table class="rectbl"><tr><th>Outcome</th><th class="r">Calls</th><th class="r">Share</th></tr>${rowsHtml}
  <tr><td class="rl">Total not connected</td><td class="r">${t.nc.toLocaleString()}</td><td class="r mut">100%</td></tr></table></div>`).classList.add('wide');
 await botMsg(`${t.nc.toLocaleString()} calls didn't connect on ${m.name}. Want my recommendation on what to rechurn, or do you want to set the rechurn yourself?`);
 twoOpts(m, ()=>runReco(m,t), ()=>openRechurn(m,telRows(t),false,'telephony'));
 cpStage=9;cpBusy=false;refocus();
}

async function runReco(m,t){
 if(cpBusy)return;cpBusy=true;userMsg('Recommendation');
 await typing();await toolCall("Retry strategy","reads Outbound Retry Strategy attached to "+m.name);
 const cap=Math.max(40,Math.round(m.avail*PACING*18)); // approx dial attempts/hr at current pacing (concept)
 const pct={voicemail:0.5,busy:1,drop:0.8,noans:0.7,invalid:0};
 const lines=t.rows.map(r=>{
   if(r.retryHrs===null)return{...r,rec:0,badge:'no',tag:'suppress'};
   const p=pct[r.key]!=null?pct[r.key]:0.6;const rec=Math.round(r.count*p);
   const badge=r.retryHrs<=0.5?'warn':'go';
   return{...r,rec,p,badge,tag:badge==='warn'?'urgent':'rechurn'};
 });
 const recNow=lines.filter(l=>l.retryHrs!==null&&l.retryHrs<=2).reduce((a,l)=>a+l.rec,0);
 const clear=(recNow/cap).toFixed(1);
 const rowsHtml=lines.map(l=>`<tr><td class="rl">${l.label}</td><td class="r">${l.count.toLocaleString()}</td><td>${whenLabel(l.retryHrs)}</td><td>${l.retryHrs===null?'<span class="mut">do not rechurn</span>':Math.round(l.p*100)+'% ('+l.rec.toLocaleString()+')'}<span class="recb ${l.badge}">${l.tag}</span></td></tr>`).join('');
 botBlock(`<div class="wdg"><div class="wt">Recommendation · Outbound Retry Strategy · ${m.name}</div>
  <table class="rectbl"><tr><th>Outcome</th><th class="r">Calls</th><th>Retry rule</th><th>Recommend</th></tr>${rowsHtml}</table>
  <div class="rsum"><b>Why:</b> dialer is ${m.prof} at ${PACING}:1 pacing with ${m.avail} agents available, roughly ${cap.toLocaleString()} dial attempts an hour. Busy redials after 30 minutes, a short window, so rechurn all of those now. Call drop and no answer redial after 2 hours, so push most of them now. Voicemail redials after 5 hours, so rechurn about half now and let the strategy pick up the rest. Invalid numbers have no retry rule, so suppress them. At ${cap.toLocaleString()} an hour, the ${recNow.toLocaleString()} priority retries clear in roughly ${clear} hours.</div></div>`).classList.add('wide');
 const w=document.createElement('div');w.className='btnrow';w.style.marginTop='6px';
 const a1=document.createElement('button');a1.className='btn go';a1.textContent='Apply as Rechurn Action';a1.onclick=()=>{if(cpBusy)return;openRechurn(m,telRows(t),true,'telephony');};
 w.appendChild(a1);body.appendChild(w);scroll();
 cpBusy=false;refocus();
}

async function showDisposition(m){
 if(cpBusy)return;cpBusy=true;
 await typing();await toolCall("Campaign Monitoring","reads connected-call dispositions "+(m.kind==='segment'?'for this segment':'for this campaign'));
 const d=disposition(m);
 const rowsHtml=d.rows.map(r=>`<tr><td class="rl">${r.label}</td><td class="r">${r.count.toLocaleString()}</td><td>${r.route}</td><td class="r mut">${d.cn?Math.round(r.count/d.cn*100):0}%</td></tr>`).join('');
 botBlock(`<div class="wdg"><div class="wt">Connected-call dispositions · ${m.kind}: ${m.name}</div>
  <table class="rectbl"><tr><th>Disposition</th><th class="r">Calls</th><th>Retry route</th><th class="r">Share</th></tr>${rowsHtml}</table>
  <div class="rsum">These connected calls could get a better outcome on a retry by a supervisor or a higher skilled agent. Lead generated and Do not call are left out by default, lead generated is already a success and do not call is a compliance block.</div></div>`).classList.add('wide');
 await botMsg(`${d.cn.toLocaleString()} connected calls have a disposition on ${m.name}. Want my recommendation on which to retry, or set the rechurn yourself?`);
 twoOpts(m, ()=>dispoReco(m,d), ()=>openRechurn(m,dispRows(d),false,'disposition'));

}

async function dispoReco(m,d){
 if(cpBusy)return;cpBusy=true;userMsg('Recommendation');
 await typing();await toolCall("Skill & routing","checks supervisor and senior-agent fit for "+m.name);
 const rowsHtml=d.rows.map(r=>{
   if(r.noRetry)return`<tr><td class="rl mut">${r.label}</td><td class="r mut">${r.count.toLocaleString()}</td><td>${r.route}</td><td><span class="mut">do not retry</span><span class="recb no">block</span></td></tr>`;
   if(r.optOut)return`<tr><td class="rl">${r.label}</td><td class="r">${r.count.toLocaleString()}</td><td>${r.route}</td><td><span class="mut">hold</span><span class="recb no">success</span></td></tr>`;
   const rec=Math.round(r.count*r.rec/100);
   return`<tr><td class="rl">${r.label}</td><td class="r">${r.count.toLocaleString()}</td><td>${r.route}</td><td>${r.rec}% (${rec.toLocaleString()})<span class="recb go">retry</span></td></tr>`;
 }).join('');
 botBlock(`<div class="wdg"><div class="wt">Recommendation · connected dispositions · ${m.name}</div>
  <table class="rectbl"><tr><th>Disposition</th><th class="r">Calls</th><th>Retry route</th><th>Recommend</th></tr>${rowsHtml}</table>
  <div class="rsum"><b>Why:</b> supervisor-requested calls have the highest lift, route all of those to a supervisor. Callbacks and interested leads close better with a senior agent, so retry most of them. Pricing objections and wrong-contact calls have lower lift, retry about half with a senior agent. Lead generated is already a win so it is held back, and do not call is a compliance block. Tell me if you want lead generated included.</div></div>`).classList.add('wide');
 const w=document.createElement('div');w.className='btnrow';w.style.marginTop='6px';
 const a1=document.createElement('button');a1.className='btn go';a1.textContent='Apply as Rechurn Action';a1.onclick=()=>{if(cpBusy)return;openRechurn(m,dispRows(d),true,'disposition');};
 w.appendChild(a1);body.appendChild(w);scroll();
 cpBusy=false;refocus();
}

// generalized rechurn builder: telephony or disposition rows
// fromReco=false -> shares default to 100; fromReco=true -> shares default to the recommended values
function openRechurn(m,rows,fromReco,mode){
 if(cpBusy)return;cpBusy=true;userMsg('Rechurn Action');
 (async()=>{
  await typing();await toolCall("Manage Leads","prepares rechurn by "+(mode==='disposition'?'disposition':'telephony outcome'),true);
  const id='rc'+(rcSeq++);
  const metaHdr=mode==='disposition'?'Retry route':'Retry rule';
  const colHdr=mode==='disposition'?'Disposition':'Outcome';
  const rowsHtml=rows.map(r=>{
    const off=r.noRetry, defShare=off?0:(fromReco?r.rec:100), checked=!off&&!r.optOut;
    return `<tr data-key="${r.key}" data-n="${r.count}" data-rec="${r.rec}" data-off="${off?1:0}" data-optout="${r.optOut?1:0}">
      <td><input type="checkbox" class="rcck" ${off?'disabled':(checked?'checked':'')}></td>
      <td class="rl${off?' mut':''}">${r.label}</td>
      <td class="r${off?' mut':''}">${r.count.toLocaleString()}</td>
      <td class="mut">${r.meta}</td>
      <td class="r"><input type="number" class="rcsh" min="0" max="100" step="5" value="${defShare}" ${off?'disabled':''}><span class="pct">%</span></td>
      <td class="r rco">0</td></tr>`;
  }).join('');
  const el=botBlock(`<div class="wdg" id="${id}"><div class="wt">Rechurn action · ${mode} · ${m.kind}: ${m.name}</div>
   <table class="rectbl"><tr><th></th><th>${colHdr}</th><th class="r">Calls</th><th>${metaHdr}</th><th class="r">Share</th><th class="r">Rechurn</th></tr>${rowsHtml}</table>
   <button class="rclink rcreset">Reset to recommended</button>
   <div class="rcctl"><label>Reschedule</label><select class="rcwhen"><option>Now</option><option>Per retry strategy</option><option>+30 min</option><option>+2 hours</option><option>+5 hours</option><option>Today 6 PM</option></select></div>
   <div class="rcout">Will rechurn <b class="rccount">0</b> calls <span class="rcreach"></span></div>
   <button class="btn go rcgo" style="margin-top:11px">Confirm rechurn</button></div>`);
  el.classList.add('wide');
  const root=el.querySelector('#'+id);
  const trs=[...root.querySelectorAll('tr[data-key]')];
  const out=root.querySelector('.rccount'), reach=root.querySelector('.rcreach'), whenSel=root.querySelector('.rcwhen');
  const base=mode==='disposition'?(m.connected||0):(m.dialled||0), baseLbl=mode==='disposition'?'connected':'dialled';
  function recompute(){
   let sum=0;
   trs.forEach(tr=>{
    const ck=tr.querySelector('.rcck'), sh=tr.querySelector('.rcsh');let v=0;
    if(ck&&ck.checked&&sh&&!sh.disabled){const p=Math.max(0,Math.min(100,+sh.value||0));v=Math.round((+tr.dataset.n)*p/100);}
    tr.querySelector('.rco').textContent=v.toLocaleString();sum+=v;
   });
   out.textContent=sum.toLocaleString();
   reach.textContent=base?'· '+(Math.round(sum/base*1000)/10)+'% of '+baseLbl:'';
   return sum;
  }
  root.querySelectorAll('.rcsh').forEach(i=>i.oninput=()=>{ if(+i.value>100)i.value=100; if(+i.value<0)i.value=0; recompute(); });
  root.querySelectorAll('.rcck').forEach(c=>c.onchange=recompute);
  root.querySelector('.rcreset').onclick=()=>{trs.forEach(tr=>{const off=tr.dataset.off==='1',sh=tr.querySelector('.rcsh'),ck=tr.querySelector('.rcck');if(sh&&!off)sh.value=tr.dataset.rec;if(ck&&!off)ck.checked=(tr.dataset.optout!=='1');});recompute();};
  recompute();
  root.querySelector('.rcgo').onclick=async()=>{
   if(cpBusy)return;cpBusy=true;
   const sum=recompute(),when=whenSel.value;
   const picked=trs.filter(tr=>{const ck=tr.querySelector('.rcck'),sh=tr.querySelector('.rcsh');return ck&&ck.checked&&sh&&!sh.disabled&&(+sh.value>0);}).map(tr=>tr.dataset.key+' '+tr.querySelector('.rcsh').value+'%');
   rechurned.add(chosen.name);renderCampaigns();
   showToast('Rechurn '+(when==='Now'?'started':'scheduled')+' · '+sum.toLocaleString()+' calls · '+m.name);
   await botMsg(`Done. ${sum.toLocaleString()} calls on ${m.name} queued to rechurn by ${mode} (${picked.join(', ')}), schedule: ${when}. Captured in the campaign audit trail.`);
   addAuditCard({what:`Rechurn · ${mode} · ${sum.toLocaleString()} calls · ${m.name} · ${picked.join(', ')}`,who:'Ajay Gaur · via Campaign Copilot',when:when==='Now'?'just now':when});
   const g=root.querySelector('.rcgo');g.disabled=true;g.textContent='Rechurn submitted';g.style.opacity='.6';
   cpBusy=false;refocus();
  };
  cpBusy=false;refocus();
 })();
}

function campOptions(c){
 const back=document.createElement('button'); back.className='backlink'; back.textContent='‹ All campaigns';
 back.onclick=()=>goAllCampaigns(); body.appendChild(back);
 const w=document.createElement('div'); w.className='btnrow'; w.style.marginTop='6px';
 const b1=document.createElement('button'); b1.className='btn go'; b1.textContent='Show segment details';
 b1.onclick=()=>{ if(cpBusy)return; showSegments(c); };
 const b2=document.createElement('button'); b2.className='btn alt'; b2.textContent='Rechurn';
 b2.onclick=()=>{ if(cpBusy)return; runRechurnEntry(scopeMeta(c,false)); };

async function chooseCampaign(c){if(cpBusy)return;cpBusy=true;chosen=c;setScope('Scope: '+c.name);userMsg(c.name);await typing();await toolCall("Reporting fetch","reads campaign detail for "+c.name);renderCampaignDetail(c);await botMsg(`Here's where ${c.name} stands right now. Pick an option below, or tell me what to do.`);cpStage=2;campOptions(c);cpBusy=false;refocus();}
async function stepReport(){const c=chosen,o=outcomes(c);await typing();await toolCall("Reporting fetch","reads lead-level data for "+c.name);await botMsg(`On ${c.name}: ${o.dialled.toLocaleString()} of ${c.total.toLocaleString()} leads dialled so far, ${o.connected.toLocaleString()} connected — a ${o.rate}% connect rate (connected of dialled). ${o.noConnect.toLocaleString()} dialled leads didn't connect.`);await typing();await toolCall("Reporting fetch","groups the "+o.noConnect.toLocaleString()+" leads by last telephony outcome");botWidget("Didn't connect · last telephony outcome",[{label:"Voicemail",val:o.voicemail,color:"#f59e0b"},{label:"Busy",val:o.busy,color:"#1250de"},{label:"Switched off / invalid",val:o.unreachable,color:"#c2ccd6"}]);await botMsg(`${o.voicemail.toLocaleString()} leads hit voicemail and ${o.busy.toLocaleString()} were busy, so ${o.eligible.toLocaleString()} leads are callable again. The ${o.unreachable.toLocaleString()} switched-off or invalid leads can't be rechurned, so I left them out.`);await botMsg("Basis: Campaign Monitoring, last telephony outcome.");guard(`Rechurning retries live leads, so I'll <b>confirm before I act</b>. Reply <b>rechurn</b> to retry all ${o.eligible.toLocaleString()} leads, or <b>schedule</b> for 6 PM.`);}
async function stepRechurn(txt){const c=chosen,o=outcomes(c);const sched=/sched|later|6|pm|evening|tonight/i.test(txt);await typing();await toolCall("Rechurn · Manage Leads","retries the chosen leads by call outcome",true);rechurned.add(c.name);renderCampaigns();showToast("Rechurn "+(sched?"scheduled":"done")+" · "+o.eligible.toLocaleString()+" leads · captured in campaign audit trail");await botMsg(sched?`Scheduled. ${o.eligible.toLocaleString()} leads on ${c.name} will rechurn at 6 PM, set to Retry Scheduled. Captured in the campaign audit trail.`:`Done. ${o.eligible.toLocaleString()} leads on ${c.name} set to Retry Scheduled and rechurned by call outcome, voicemail and busy. Captured in the campaign audit trail.`);addAuditCard({what:`Rechurn · ${o.eligible.toLocaleString()} leads · ${c.name} · telephony outcome: voicemail, busy`,who:"Ajay Gaur · via Campaign Copilot",when:sched?"scheduled for 6:00 PM today":"just now"});botBlock('<div class="payoff"><b>From a question to done, in chat.</b><span class="small">The old way: open Manage Leads, filter by outcome, set the rechurn by hand.</span></div>');}
async function send(){
 if(cpBusy) return;
 const inp=document.getElementById('cpInput'); if(!inp) return;
 const lp=body.querySelector('.cp-landing'); if(lp) lp.remove();
 body.querySelectorAll('.cp-sugs-inline').forEach(e=>e.remove());
 const v=(inp.value||'').trim();
 // keyword: "rechurn" opens the rechurn action for the selected campaign, else asks to pick one first
 if(/rechurn/i.test(v)){
   userMsg(v); inp.value='';
   const hit=resolveScope(v);
   if(hit){ // a campaign or segment name was typed, open it directly
     chosen=hit.camp; renderCampaigns();
     runRechurnEntry(hit.kind==='segment'?scopeMeta(hit.seg,true):scopeMeta(hit.camp,false), true);
     return;
   }
   if(chosen){ runRechurnEntry(scopeMeta(chosen,false), true); return; } // use the already-selected campaign
   cpBusy=true; await typing();
   await botMsg("Tell me which campaign, for example “rechurn Renewal Reminders”, or pick one below.");
   if(!body.querySelector('.camprow')) await stepList();
   cpStage=1; cpBusy=false; refocus(); return;
 }
 // keyword routes: same idea as rechurn, reachable from any prompt
 if(/missed/i.test(v)){ userMsg(v); inp.value=''; cpBusy=true; await stepMissed(); cpStage=9; cpBusy=false; refocus(); return; }
 if(/boost/i.test(v)){ userMsg(v); inp.value=''; pickCampaignThen(c=>boostEntry(c),'Boost record'); return; }
 if(/set criteria|benchmark|attention criteria|threshold/i.test(v)){ userMsg(v); inp.value=''; setCriteria(); return; }
 if(/create.*campaign|new campaign/i.test(v)){ userMsg(v); inp.value=''; cpBusy=true; await stepCreate(); cpBusy=false; refocus(); return; }
 if(/lead summary|leads ingested|lead-level|view leads|\bleads?\b/i.test(v)){
   userMsg(v); inp.value=''; cpBusy=true;
   if(/by file|file/i.test(v)) await leadView2('file');
   else if(/by campaign|campaign/i.test(v)) await leadView2('campaign');
   else await stepLeadSummary();
   cpStage=9; cpBusy=false; refocus(); return;
 }
 // any prompt, at any stage: open a named campaign if matched, otherwise search / list campaigns
 const hitC=v?resolveCampByName(v):null;
 if(hitC){ userMsg(v); inp.value=''; chooseCampaign(hitC); return; }
 userMsg(v||"Which campaigns are running right now?"); inp.value='';
 cpBusy=true; await routeList(v,stepList); cpStage=1; cpBusy=false; refocus(); return;
}
const cpSuggest=["Which campaigns are running right now?","Show me all renewal campaigns","List active dialling campaigns"];
const cpDrill=["Give me the distribution of leads that are not connected per the telephony outcome"];
function renderSugs(list){const d=document.createElement('div');d.className='cp-sugs cp-sugs-inline';d.innerHTML=list.map(s=>`<button class="sug">${s}</button>`).join('');body.appendChild(d);scroll();d.querySelectorAll('.sug').forEach((b,i)=>{b.onclick=()=>{const inp=document.getElementById('cpInput');if(inp)inp.value=list[i];send();};});}

 body.innerHTML='';setScope('Scope: all campaigns');cpStage=0;cpBusy=false;chosen=null;
 renderInput(false);
 const l=document.createElement('div');l.className='cp-landing';
 const cards=[
  {k:'running',c:'',ic:'bars',tag:'Monitor',t:'Running campaigns',d:'Every campaign dialling right now, with records, attempted and connected at a glance.'},
  {k:'under',c:'c2',ic:'funnel',tag:'Diagnose',t:'Below benchmark',d:`Campaigns below your ${critUnder.metric} criteria, ranked worst first.`},
  {k:'attention',c:'c3',ic:'bell',tag:'Alert',t:'Needs attention',d:'Stalled or running below 60% connect, the ones to decide on now.'},
  {k:'missed',c:'c5',ic:'phone',tag:'Recover',t:'Missed calls',d:'Inbound missed calls, how many agents dialled back, and who is still pending.'},
  {k:'leads',c:'c6',ic:'donut',tag:'Leads',t:'Lead summary',d:'Leads ingested today, how many dialled and how many still pending.'},
  {k:'create',c:'c4',ic:'plus',tag:'Create',t:'New campaign',d:'Set up a campaign, pick the dialer profile and schedule, then add segments.'}
 ];
 const legend=[{c:'#ee5a47',t:'Ask in natural language'},{c:'#1250de',t:'Proactive alerts'},{c:'#1ba672',t:'Act inline'},{c:'#faa21b',t:'One-click rechurn'}];
 l.innerHTML=`<div class="cp-greet">`+
   `<div class="gt"><div class="hi">Hello, <b>Aman</b></div><div class="q">What would you like to analyse today?</div></div></div>`+
   `<div class="cp-cards">`+cards.map(c=>`<button class="cpcard ${c.c}" data-k="${c.k}"><div class="cphead"><div class="ci">${I[c.ic]}</div><span class="ctag">${c.tag}</span></div><div class="ct">${c.t}</div><div class="cd">${c.d}</div></button>`).join('')+`</div>`+
   `<div class="cp-legend">`+legend.map(g=>`<span class="leg"><i style="background:${g.c}"></i>${g.t}</span>`).join('')+`</div>`;
 body.appendChild(l);
 l.querySelectorAll('.cpcard').forEach(b=>{ b.onclick=()=>launchCard(b.dataset.k); });
}
